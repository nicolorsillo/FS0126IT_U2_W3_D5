<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRUDazon - Backoffice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-dark min-vh-100 d-flex flex-column">
    <header class="sticky-top">
      <nav
        class="navbar navbar-expand-md bg-body-tertiary"
        data-bs-theme="dark"
      >
        <div class="container-fluid">
          <a class="navbar-brand" href="./index.html">CRUDazon</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-md-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="./index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./backoffice.html"
                  >Backoffice</a
                >
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main class="flex-grow-1">
      <section class="text-center my-3 text-light">
        <h1>CRUDazon</h1>
        <h3>Sezione Backoffice</h3>
      </section>
      <div class="container">
        <div class="row justify-content-center my-5">
          <div class="col-12 col-md-6 text-light">
            <form id="product-form">
              <div class="mb-3">
                <label for="name" class="form-label">Nome prodotto</label>
                <input type="text" class="form-control" id="name" required />
              </div>
              <div class="mb-3">
                <label for="description" class="form-label"
                  >Descrizione prodotto</label
                >
                <textarea
                  type="text"
                  class="form-control"
                  id="description"
                  rows="5"
                  required
                ></textarea>
              </div>
              <div class="mb-3">
                <label for="brand" class="form-label">Brand prodotto</label>
                <select
                  class="form-select"
                  aria-label="Default select example"
                  id="brand"
                  required
                >
                  <option selected>Seleziona un brand</option>
                  <option value="Atari">Atari</option>
                  <option value="Microsoft">Microsoft</option>
                  <option value="Nintendo">Nintendo</option>
                  <option value="SEGA">SEGA</option>
                  <option value="Sony">Sony</option>
                </select>
              </div>
              <div class="mb-3">
                <label for="price" class="form-label">Prezzo prodotto</label>
                <input type="number" class="form-control" id="price" required />
              </div>
              <div class="mb-3">
                <label for="imageUrl" class="form-label"
                  >URL immagine prodotto</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="imageUrl"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary" id="btn-salva">
                SALVA
              </button>
              <button
                type="reset"
                class="btn btn-primary"
                onclick="resetForm()"
              >
                RESET
              </button>
            </form>
          </div>
        </div>
      </div>
      <p class="d-flex gap-1 justify-content-center">
        <button
          class="btn btn-primary"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#productListCollpase"
          aria-expanded="false"
          aria-controls="productListCollpase"
        >
          Product List <br />
          <i class="bi bi-chevron-down"></i>
        </button>
      </p>
      <div class="container collapse" id="productListCollpase">
        <div class="row justify-content-center my-5">
          <section class="text-center" id="spinner-section">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </section>
          <div class="col-12" id="product-list"></div>
        </div>
      </div>
    </main>
    <footer class="text-light">
      <div class="text-center">
        <p><span id="year"></span> - CRUDazon</p>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/backoffice.js"></script>
  </body>
</html>
